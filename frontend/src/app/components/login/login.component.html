<div class="auth-container">
  <div class="auth-card">
    <h2>Finly</h2>
    <p>Dê um fim no descontrole financeiro</p>

    <button class="btn btn-primary btn-block" (click)="authService.login()">
      Entrar
    </button>

    <div class="auth-footer">
      <p>
        Não tem uma conta?
        <a href="#" (click)="authService.loginWithSignup(); $event.preventDefault()">
          Cadastre-se
        </a>
      </p>
    </div>
  </div>
</div>
