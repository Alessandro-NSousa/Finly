<div class="auth-container">
  <div class="auth-card">
    <h2>Completar Perfil</h2>
    <p>Informe sua renda mensal para começar</p>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="setupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="monthlyIncome">Renda Mensal (R$)</label>
        <input
          type="number"
          id="monthlyIncome"
          formControlName="monthlyIncome"
          placeholder="5000.00"
          step="0.01"
        />
        <div *ngIf="setupForm.get('monthlyIncome')?.invalid && setupForm.get('monthlyIncome')?.touched" class="error-text">
          Informe um valor maior que zero
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || setupForm.invalid">
        {{ loading ? 'Salvando...' : 'Começar' }}
      </button>
    </form>

    <div class="auth-footer">
      <p><a href="#" (click)="logout(); $event.preventDefault()">Sair</a></p>
    </div>
  </div>
</div>
