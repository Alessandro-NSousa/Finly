<div class="auth-container">
  <div class="auth-card">
    <h2>📝 Cadastro - Finly</h2>
    <p>Comece a controlar suas finanças</p>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nome</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Seu nome"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="seu@email.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
        />
      </div>

      <div class="form-group">
        <label for="monthlyIncome">Renda Mensal (R$)</label>
        <input
          type="number"
          id="monthlyIncome"
          formControlName="monthlyIncome"
          placeholder="5000.00"
          step="0.01"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || registerForm.invalid">
        {{ loading ? 'Criando conta...' : 'Cadastrar' }}
      </button>

      <div class="auth-footer">
        <p>Já tem uma conta? <a routerLink="/login">Faça login</a></p>
      </div>
    </form>
  </div>
</div>
