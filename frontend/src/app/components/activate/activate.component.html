<div class="auth-container">
  <div class="auth-card">
    <h2>Ativação de Conta</h2>

    <div *ngIf="loading" class="loading-container">
      <div class="spinner"></div>
      <p>Ativando sua conta...</p>
    </div>

    <div *ngIf="!loading && successMessage" class="alert alert-success">
      {{ successMessage }}
      <p style="margin-top: 15px;">Você será redirecionado para a página de login em instantes...</p>
      <button type="button" class="btn btn-primary btn-block" (click)="goToLogin()">
        Ir para Login
      </button>
    </div>

    <div *ngIf="!loading && errorMessage" class="alert alert-danger">
      {{ errorMessage }}
      <div style="margin-top: 15px;">
        <button type="button" class="btn btn-primary btn-block" (click)="goToLogin()">
          Voltar para Login
        </button>
      </div>
    </div>
  </div>
</div>
