<div class="auth-container">
  <div class="auth-card">
    <h2>Finly</h2>
    <p>Informe seu email para receber o link de redefinição de senha</p>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form *ngIf="!successMessage" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="seu@email.com"
        />
        <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="error-text">
          Informe um email válido
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || forgotForm.invalid">
        {{ loading ? 'Enviando...' : 'Enviar link de redefinição' }}
      </button>
    </form>

    <div class="auth-footer">
      <p><a routerLink="/login">Voltar para o login</a></p>
    </div>
  </div>
</div>
