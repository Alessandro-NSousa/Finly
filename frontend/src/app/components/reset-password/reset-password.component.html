<div class="auth-container">
  <div class="auth-card">
    <h2>Finly</h2>
    <p>Crie uma nova senha para a sua conta</p>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
      <p class="redirect-info">Redirecionando para o login...</p>
    </div>

    <div *ngIf="errorMessage && !successMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form *ngIf="!successMessage && token" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <input
          type="password"
          id="newPassword"
          formControlName="newPassword"
          placeholder="••••••"
        />
        <div *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched" class="error-text">
          Mínimo 6 caracteres
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar nova senha</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="••••••"
        />
        <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('passwordsMismatch')" class="error-text">
          As senhas não coincidem
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || resetForm.invalid">
        {{ loading ? 'Redefinindo...' : 'Redefinir senha' }}
      </button>
    </form>

    <div class="auth-footer" *ngIf="!successMessage">
      <p><a routerLink="/login">Voltar para o login</a></p>
    </div>
  </div>
</div>
