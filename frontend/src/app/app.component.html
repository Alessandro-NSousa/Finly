<div class="app-wrapper" *ngIf="authService.isAuthenticated$ | async">
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <h1>💰 Finly</h1>
      </div>
      <div class="nav-menu">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/debts" routerLinkActive="active">Dívidas</a>
        <span class="user-info">{{ (authService.user$ | async)?.name || 'Usuário' }}</span>
        <button class="btn btn-danger" (click)="logout()">Sair</button>
      </div>
    </div>
  </nav>
</div>

<router-outlet></router-outlet>
